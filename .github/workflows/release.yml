name: Build & Release Windows App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js (standalone)
        run: npm run build

      - name: Compile Electron main process
        run: npx tsc -p electron/tsconfig.json

      # Delete any pre-existing release for this tag to avoid duplicates
      # (GitHub auto-creates a release when a tag is pushed)
      - name: Clean up duplicate release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          Write-Host "Checking for existing release with tag: $tag"
          try {
            $releases = gh release list --json tagName,isPrerelease,id -L 100 | ConvertFrom-Json
            $dupes = $releases | Where-Object { $_.tagName -eq $tag }
            foreach ($d in $dupes) {
              Write-Host "Deleting duplicate release $($d.id) for tag $tag"
              gh release delete $d.id --yes --cleanup-tag
            }
          } catch {
            Write-Host "No existing release to clean up"
          }

      - name: Build Electron app (Windows)
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark as latest release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          Write-Host "Setting $tag as latest release"
          gh release edit $tag --latest

      - name: Upload installer artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            release/*.exe
            release/*.yml
            release/*.blockmap
          retention-days: 30
          if-no-files-found: ignore