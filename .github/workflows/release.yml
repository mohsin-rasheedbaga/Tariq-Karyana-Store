name: Build & Release Windows App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js (standalone)
        run: npm run build

      - name: Compile Electron main process
        run: npx tsc -p electron/tsconfig.json

      # Delete any pre-existing release for this tag to avoid duplicates
      - name: Clean up duplicate release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          Write-Host "Checking for existing release with tag: $tag"
          $headers = @{
            "Authorization" = "Bearer $env:GH_TOKEN"
            "Accept" = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          try {
            $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases" -Headers $headers
            foreach ($r in $releases) {
              if ($r.tag_name -eq $tag) {
                Write-Host "Deleting duplicate release $($r.id) for tag $tag"
                try {
                  Invoke-RestMethod -Method DELETE -Uri "https://api.github.com/repos/${{ github.repository }}/releases/$($r.id)" -Headers $headers
                  Write-Host "Deleted successfully"
                } catch {
                  Write-Host "Delete failed: $_"
                }
              }
            }
          } catch {
            Write-Host "Could not list releases: $_"
          }
          Write-Host "Cleanup done"

      - name: Build Electron app (Windows)
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish draft release and mark as latest
      - name: Publish release and mark as latest
        if: success()
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $headers = @{
            "Authorization" = "Bearer $env:GH_TOKEN"
            "Accept" = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          try {
            $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases" -Headers $headers
            foreach ($r in $releases) {
              if ($r.tag_name -eq $tag) {
                Write-Host "Found release $($r.id) for tag $tag (draft: $($r.draft))"
                # Publish draft and mark as latest
                $body = @{ draft = $false; make_latest = "true" } | ConvertTo-Json
                Invoke-RestMethod -Method PATCH -Uri "https://api.github.com/repos/${{ github.repository }}/releases/$($r.id)" -Headers $headers -Body $body -ContentType "application/json"
                Write-Host "Published and set as latest"
                break
              }
            }
          } catch {
            Write-Host "Could not publish: $_"
          }

      - name: Upload installer artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            release/*.exe
            release/*.yml
            release/*.blockmap
          retention-days: 30
          if-no-files-found: ignore